<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compass - Login Wireframe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="wireframe-nav">
        <strong>Compass Wireframes - Low Fidelity</strong>
        <div>
            <a href="index.html">Index</a>
            <a href="01-login.html" class="active">1. Login</a>
            <a href="02-dashboard.html">2. Dashboard</a>
            <a href="03-upload.html">3. Upload</a>
            <a href="04-alerts.html">4. Alerts</a>
        </div>
    </div>

    <div class="wireframe-container">
        <div class="screen-title">Screen 1: LOGIN PAGE | URL: /login</div>

        <div class="app-header">
            <div class="logo">[LOGO]</div>
            <div>
                <a href="#" class="btn btn-small">[Back to Home]</a>
            </div>
        </div>

        <div class="main-content">
            <div class="login-container">
                <div class="login-title">[ LOGIN ]</div>

                <button class="btn btn-large">
                    [Continue with Google]
                </button>

                <div class="divider">- OR -</div>

                <form>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" placeholder="[ Email Input ]">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" placeholder="[ Password Input ]">
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 12px;">
                        <label>
                            <input type="checkbox"> Remember Me
                        </label>
                        <a href="#" style="color: #000;">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large">
                        [LOGIN]
                    </button>
                </form>

                <div style="text-align: center; margin-top: 20px; font-size: 12px;">
                    No account? <a href="#" style="color: #000; font-weight: bold;">[Register]</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
