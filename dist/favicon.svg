<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0c141f"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#2e3541" stroke-width="1.5"/>
  <!-- Compass needle - north (lime green) -->
  <polygon points="16,5 18.2,15.5 16,14 13.8,15.5" fill="#b5d33f"/>
  <!-- Compass needle - south (muted) -->
  <polygon points="16,27 13.8,16.5 16,18 18.2,16.5" fill="#45455b"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#c6c4df"/>
</svg>
