<body class="bg-background text-on-surface antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Abstract Background -->
<div class="absolute inset-0 z-0">
<img alt="" class="w-full h-full object-cover opacity-10 mix-blend-screen" data-alt="A highly abstract, dark-themed background image representing secure financial data and momentum. Deep navy blue tones dominate the composition, subtly illuminated by faint, glowing geometric patterns that intersect dynamically. The lighting is moody and low-key, creating a sense of depth and high-end technological sophistication suitable for a premium fintech platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAK2-5MgEI2mIC6uNshtIAt2dgp9kAoQv2la-KxhDXpjj0LGw4s9UlOoLvUHUAcd2NwsONUJvR4rAY390bNJH_po-xCcTqUKh-HpoFKelDxnZCjmpFjDkkpIiIrqdr0a4z8Hkr0ATBs17GA3XfnvuCrzKN75MrCF6MCajH-utSIVPtPyVO2a2i3FwOZiLurRtLj82nESr-NUa-hfgkkC9HlKxtFjkSFPdT8TgQKJ2uWkOtS_3fWrKdGLew-4-5QsnXYTzqeZIMaQ8Q"/>
<div class="absolute inset-0 bg-gradient-to-b from-background/50 via-background to-background/90"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-6">
<!-- Glassmorphism Card -->
<div class="bg-surface-container/60 backdrop-blur-2xl border border-white/5 rounded-xl p-8 shadow-2xl">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 mb-4 text-secondary">
<span class="material-symbols-outlined text-[32px]">explore</span>
<span class="font-h2 text-h2 tracking-tighter">Compass</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface text-center">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-2">Log in to securely manage your portfolio.</p>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-surface/50 border border-outline-variant rounded-lg hover:bg-surface-container-high hover:border-outline transition-colors duration-200" type="button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-md text-body-md text-on-surface">Continue with Google</span>
</button>
<!-- Divider -->
<div class="flex items-center my-6">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="px-4 font-label-caps text-label-caps text-outline uppercase tracking-widest">or email</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Form -->
<form action="#" class="space-y-5" method="POST">
<!-- Email Field -->
<div>
<label class="block font-body-md text-body-md text-on-surface-variant mb-2" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container border border-outline-variant rounded-lg text-on-surface font-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block font-body-md text-body-md text-on-surface-variant" for="password">Password</label>
<a class="font-body-md text-body-md text-secondary hover:text-secondary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container border border-outline-variant rounded-lg text-on-surface font-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex items-center justify-center gap-2 py-3 px-4 bg-secondary text-on-secondary font-h3 text-h3 rounded-lg hover:bg-secondary-fixed active:scale-[0.98] transition-all duration-200 mt-2 shadow-[0_0_20px_rgba(181,211,63,0.15)]" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-secondary hover:text-secondary-fixed font-semibold transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Trust Indicators -->
<div class="mt-8 flex justify-center gap-6 text-outline-variant">
<span class="material-symbols-outlined text-[24px]" title="Encrypted Connection">verified_user</span>
<span class="material-symbols-outlined text-[24px]" title="Secure Architecture">shield_lock</span>
<span class="material-symbols-outlined text-[24px]" title="Enterprise Grade">domain</span>
</div>
</main>
